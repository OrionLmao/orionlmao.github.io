<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100K Astin Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f6f9; --surface:#fff; --surface2:#f0f2f6;
    --border:#dde2ea; --border2:#c8d0dc;
    --accent:#2563eb; --accent-lt:#eff4ff;
    --orange:#ea580c; --green:#16a34a;
    --red:#dc2626; --purple:#7c3aed;
    --text:#1a2030; --text2:#4b5668; --muted:#8a95a8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  header{background:var(--surface);border-bottom:2px solid var(--border);padding:18px 40px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .logo-area h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,3vw,42px);letter-spacing:2px;color:var(--accent);line-height:1;}
  .logo-area .subtitle{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-shrink:0;}
  .header-total .count{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--accent);line-height:1;text-align:right;}
  .header-total .label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;text-align:right;}

  .sync-badge{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;white-space:nowrap;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s;}
  .sync-badge.ok         .sync-dot{background:var(--green);}
  .sync-badge.loading    .sync-dot{background:var(--accent);animation:pulse 0.8s infinite;}
  .sync-badge.error      .sync-dot{background:var(--red);}

  main{max-width:1320px;margin:0 auto;padding:28px 40px 60px;}

  /* loading screen */
  .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
  .loading-screen.fade-out{animation:fadeOut 0.5s ease forwards;}
  @keyframes fadeOut{to{opacity:0;pointer-events:none;}}
  .loading-bars{display:flex;align-items:flex-end;gap:5px;height:48px;margin-bottom:20px;}
  .loading-bars span{width:8px;border-radius:4px;background:var(--accent);animation:barBounce 1s ease-in-out infinite;}
  .loading-bars span:nth-child(1){animation-delay:0s;}   .loading-bars span:nth-child(2){animation-delay:0.1s;}
  .loading-bars span:nth-child(3){animation-delay:0.2s;} .loading-bars span:nth-child(4){animation-delay:0.3s;}
  .loading-bars span:nth-child(5){animation-delay:0.4s;} .loading-bars span:nth-child(6){animation-delay:0.5s;}
  .loading-bars span:nth-child(7){animation-delay:0.6s;}
  @keyframes barBounce{0%,100%{height:10px;opacity:0.4;}50%{height:46px;opacity:1;}}
  .loading-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--accent);margin-bottom:6px;}
  .loading-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;animation:fadePulse 1.5s ease-in-out infinite;}
  @keyframes fadePulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  /* stats */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .stat-card .pill{position:absolute;top:0;left:0;right:0;height:4px;border-radius:10px 10px 0 0;transform:scaleX(0);transform-origin:left;transition:transform 0.9s ease;}
  .stat-card.loaded .pill{transform:scaleX(1);}
  .stat-card .val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;margin:6px 0 2px;}
  .stat-card .lbl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
  .stat-card .ico{font-size:18px;float:right;opacity:0.45;}
  .sc-blue .pill{background:var(--accent);}.sc-blue .val{color:var(--accent);}
  .sc-orange .pill{background:var(--orange);}.sc-orange .val{color:var(--orange);}
  .sc-green .pill{background:var(--green);}.sc-green .val{color:var(--green);}
  .sc-red .pill{background:var(--red);}.sc-red .val{color:var(--red);}
  .sc-purple .pill{background:var(--purple);}.sc-purple .val{color:var(--purple);}
  .sc-dark .pill{background:var(--text);}.sc-dark .val{color:var(--text);}

  /* progress */
  .progress-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .progress-header h2{font-weight:600;font-size:13px;color:var(--text2);}
  .progress-pct{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);}
  .progress-track{height:10px;background:var(--surface2);border-radius:99px;position:relative;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);border-radius:99px;transition:width 1.2s cubic-bezier(0.16,1,0.3,1);}
  .progress-target-line{position:absolute;top:-2px;width:2px;height:14px;background:var(--border2);border-radius:1px;}
  .progress-footer{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);}

  /* section title */
  .sec{font-weight:600;font-size:12px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:0.8px;font-family:'DM Mono',monospace;}
  .sec::after{content:'';flex:1;height:1px;background:var(--border);}

  /* charts */
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .chart-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:var(--surface2);}
  .chart-head h3{font-weight:600;font-size:13px;color:var(--text);}
  .rg{display:flex;gap:3px;}
  .rb{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;cursor:pointer;border-radius:5px;transition:all 0.15s;}
  .rb.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .rb:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  .chart-body{padding:18px;}
  .chart-inner{position:relative;width:100%;height:416px;}
  .chart-inner canvas{position:absolute;top:0;left:0;}
  .chart-legend{display:flex;flex-wrap:wrap;gap:10px 18px;padding:10px 18px;border-top:1px solid var(--border);background:var(--surface2);}
  .li{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);}
  .lb{width:11px;height:11px;border-radius:2px;flex-shrink:0;}
  .ll{width:20px;height:3px;flex-shrink:0;border-radius:2px;}
  .ld{width:20px;height:0;flex-shrink:0;}

  /* tabs */
  .tabs-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface2);}
  .ct{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:11px 20px;cursor:pointer;transition:all 0.15s;margin-bottom:-1px;}
  .ct.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface);}
  .chart-panels{padding:18px;}
  .cp{display:none;}.cp.active{display:block;}
  .detail-chart-inner{position:relative;width:100%;height:416px;}
  .detail-chart-inner canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}
  .pc{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
  .pl{display:flex;gap:12px;margin-left:auto;align-items:center;flex-wrap:wrap;}

  /* table */
  .table-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .table-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;background:var(--surface2);flex-wrap:wrap;}
  .table-head h3{font-weight:600;font-size:13px;color:var(--text);margin-right:6px;}
  .bt{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;cursor:pointer;border-radius:5px;transition:all 0.15s;}
  .bt.active{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}
  .table-wrap{overflow:auto;max-height:440px;}
  table{width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:11px;}
  thead th{padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--surface);font-weight:500;}
  tbody tr{border-bottom:1px solid var(--surface2);}
  tbody tr:hover{background:var(--surface2);}
  tbody tr.today-row{background:var(--accent-lt);}
  tbody tr.today-row td:first-child{border-left:3px solid var(--accent);}
  tbody td{padding:8px 12px;vertical-align:middle;color:var(--text2);}
  td strong{color:var(--text);}
  .sur{color:var(--green);font-weight:600;}.def{color:var(--red);font-weight:600;}
  .dim{color:var(--border2);}
  .tag-today{font-size:9px;background:var(--accent);color:#fff;padding:1px 5px;border-radius:3px;margin-left:5px;font-family:'DM Sans',sans-serif;font-weight:600;vertical-align:middle;}

  footer{text-align:center;padding:32px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;border-top:1px solid var(--border);}

  @media(max-width:1000px){main{padding:18px 18px 50px;}.stats-grid{grid-template-columns:repeat(3,1fr);}.chart-inner{height:250px;}header{padding:14px 18px;}}
  @media(max-width:600px){
    header{flex-wrap:nowrap;gap:8px;padding:8px 12px;align-items:center;}
    .logo-area{min-width:0;flex:1;}
    .logo-area h1{font-size:16px;letter-spacing:1px;}
    .logo-area .subtitle{font-size:8px;letter-spacing:0.5px;}
    .header-right{flex-shrink:0;}
    .header-total .count{font-size:22px;}
    .header-total .label{font-size:8px;}
    .sync-badge{font-size:9px;padding:3px 7px;}
    .sync-dot{width:6px;height:6px;}
    .stats-grid{grid-template-columns:repeat(2,1fr);}
    .chart-inner{height:180px;}
    .detail-chart-inner{height:180px;}
    main{padding:10px 10px 40px;}
    .chart-body{padding:8px;}
    .chart-head{padding:8px 12px;}
    .chart-legend{gap:6px 12px;padding:8px 12px;font-size:9px;}
    .tab-bar{overflow-x:auto;}
    .ct{padding:9px 12px;font-size:9px;}
    .chart-panels{padding:10px;}
    .rb{font-size:9px;padding:3px 7px;}
    .table-wrap{max-height:320px;}
    table{font-size:10px;}
    thead th{padding:6px 8px;font-size:9px;}
    tbody td{padding:6px 8px;}
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>100,000 Astin Challenge</h1>
    <div class="subtitle">2026 · 365 days · Goal: 100,000 push-ups</div>
    <div class="subtitle">274 / day · Needed for 365 days</div>
  </div>
  <div class="header-right">
    <div class="header-total">
      <div class="count" id="headerTotal">—</div>
      <div class="label">Total Push-Ups</div>
      <div style="display:flex;justify-content:flex-end;margin-top:4px;">
        <div class="sync-badge loading" id="sync-badge">
          <div class="sync-dot"></div>
          <span id="sync-text">Loading…</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="loading-screen" id="loading">
  <div class="loading-bars">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="loading-title">100K Astin Challenge</div>
  <div class="loading-sub">Loading spreadsheet…</div>
</div>

<main id="main"></main>
<footer>100,000 Astin Challenge 2026 · Data synced from Dropbox</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://square-shape-a0ba.oriongerstl.workers.dev/';
const SHEET_NAME  = '2026 Challenge 100,000';

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const GOAL = 100000, TOTAL_DAYS = 365;
const START = new Date('2026-01-01T00:00:00');
const END   = new Date('2026-12-31T00:00:00');
const AVG_NO_REST = GOAL / TOTAL_DAYS;
const AVG_1_REST  = GOAL / (TOTAL_DAYS * 6 / 7);
const AVG_2_REST  = GOAL / (TOTAL_DAYS * 5 / 7);

// ── STATE ──────────────────────────────────────────────────────────────────────
let entries = {};  // date string → { am, pm, night }
let filterMode = 'logged';
let rangeState = { main:0, daily:0, avg:0, running:0 };
let charts = { main:null, daily:null, avg:null, running:null };

// ── FETCH & PARSE DROPBOX EXCEL ────────────────────────────────────────────────
async function loadDropbox() {
  const res = await fetch(WORKER_URL);
  if (!res.ok) throw new Error('Could not fetch spreadsheet (HTTP ' + res.status + ')');
  const buf = await res.arrayBuffer();
  const wb   = XLSX.read(buf, { type:'array', cellDates:false });

  const sheet = wb.Sheets[SHEET_NAME] || wb.Sheets[wb.SheetNames[0]];
  const rows  = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });

  // Find header row dynamically — look for row containing 'Date' in first cell
  let headerIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    if (String(rows[i][0]).trim().toLowerCase() === 'date') { headerIdx = i; break; }
  }
  if (headerIdx === -1) throw new Error('Could not find header row (looking for "Date" in column A)');

  // Log first few rows for debugging
  console.log('Header row index:', headerIdx);
  console.log('Header:', rows[headerIdx]);
  console.log('First data row:', rows[headerIdx + 1]);

  // Columns: Date(0), Day No.(1), SET 1(2), Set 2(3), Set 3/4(4), Daily Total(5)
  const dateCol = 0, set1Col = 2, set2Col = 3, set3Col = 4, dailyCol = 5;

  entries = {};
  let count = 0;
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    const raw = row[dateCol];
    if (raw === '' || raw === null || raw === undefined) continue;

    // Parse date — with cellDates:false, Excel dates are serial numbers
    let ds;
    if (typeof raw === 'number') {
      // Convert Excel serial to date using UTC to avoid any timezone shift
      const utcMs = Math.round((raw - 25569) * 86400 * 1000);
      const d = new Date(utcMs);
      ds = d.getUTCFullYear() + '-' +
           String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
           String(d.getUTCDate()).padStart(2,'0');
    } else if (raw instanceof Date) {
      ds = raw.getUTCFullYear() + '-' +
           String(raw.getUTCMonth()+1).padStart(2,'0') + '-' +
           String(raw.getUTCDate()).padStart(2,'0');
    } else {
      // String date — parse as local date by splitting manually
      const str = String(raw).trim().split('T')[0].split(' ')[0];
      if (!/^\d{4}-\d{2}-\d{2}$/.test(str)) continue;
      ds = str;
    }

    if (!ds.startsWith('2026')) continue;

    // Use Daily Total column from spreadsheet directly if available
    const dailyRaw = parseFloat(row[dailyCol]);
    const set1  = parseFloat(row[set1Col]) || 0;
    const set2  = parseFloat(row[set2Col]) || 0;
    const set3  = parseFloat(row[set3Col]) || 0;

    // Only store rows that have been actually logged (daily total > 0, or it's a rest day with explicit 0s)
    const hasEntry = !isNaN(dailyRaw) && (dailyRaw > 0 || (set1 === 0 && set2 === 0 && set3 === 0 && row[set1Col] !== '' && row[set1Col] !== undefined));
    if (!hasEntry && dailyRaw === 0 && row[set1Col] === '') continue; // future blank rows
    if (isNaN(dailyRaw) && set1 === 0 && set2 === 0 && set3 === 0) continue; // truly empty

    entries[ds] = { am: set1, pm: set2, night: set3 };
    count++;
  }

  console.log('Imported entries:', count, 'Last few:', Object.entries(entries).slice(-3));
  if (count === 0) throw new Error('No 2026 rows found in spreadsheet');
  return count;
}

// ── SYNC BADGE ─────────────────────────────────────────────────────────────────
function setSyncBadge(state, text) {
  const badge = document.getElementById('sync-badge');
  const label = document.getElementById('sync-text');
  if (!badge || !label) return;
  badge.className = 'sync-badge ' + state;
  label.textContent = text;
}

// ── DATA HELPERS ───────────────────────────────────────────────────────────────
function dStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function buildDays() {
  const days = []; let running = 0, idx = 0;
  const cur = new Date(START);
  while (cur <= END) {
    idx++;
    const ds = dStr(cur), e = entries[ds], hasData = !!e;
    const am = e?.am||0, pm = e?.pm||0, night = e?.night||0;
    const daily = am + pm + night;
    if (hasData) running += daily;
    const tgt_no = Math.round(idx * GOAL / TOTAL_DAYS);
    const tgt_1r = Math.round(idx * AVG_1_REST);
    const tgt_2r = Math.round(idx * AVG_2_REST);
    const surplus = running - tgt_no;
    const avg = (running > 0 && idx > 0) ? Math.round(running / idx) : 0;
    days.push({ date:ds, dayNum:idx, am, pm, night, daily, running, tgt_no, tgt_1r, tgt_2r, surplus, avg, hasData });
    cur.setDate(cur.getDate() + 1);
  }
  for (let i = 0; i < days.length; i++) {
    const w = days.slice(Math.max(0,i-13), i+1).filter(d => d.hasData);
    days[i].ma14 = w.length ? Math.round(w.reduce((a,d) => a+d.daily, 0) / w.length) : null;
  }
  return days;
}

// ── CHART HELPERS ──────────────────────────────────────────────────────────────
Chart.defaults.color = '#1a2030';
Chart.defaults.font.family = 'DM Sans';
Chart.defaults.font.size = 12;

function sliceDays(days, range) {
  const l = days.filter(d => d.hasData);
  return (!range || range === 0) ? l : l.slice(-range);
}
function fmtShort(ds) {
  const d = new Date(ds+'T00:00:00');
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}
function fmtWithDay(d) {
  const dt = new Date(d.date+'T00:00:00');
  const day = String(dt.getDate()).padStart(2,'0');
  const month = String(dt.getMonth()+1).padStart(2,'0');
  return [day, month, String(d.dayNum)];
}
function ttCfg() {
  return { backgroundColor:'#fff', titleColor:'#111827', bodyColor:'#4b5668', borderColor:'#dde2ea', borderWidth:1, padding:10 };
}
function xScales(showTitle=false) {
  const mobile = window.innerWidth < 600;
  const fontSize = mobile ? 9 : 11;
  // Approximate max label width: "00/00" ~5 chars at fontSize px
  const labelPx = fontSize * 3.5 + 10;
  const title = showTitle ? {display:true,text:'Date / Day No.',color:'#374151',font:{size:16,weight:'700'}} : {display:false};
  // Per-call step object so each chart instance computes its own interval independently
  const step = { val: 5 };
  return {
    x: {
      offset:true,
      ticks:{
        callback(val){
          const l=this.getLabelForValue(val);
          if(!Array.isArray(l)) return null;
          const dayNum=parseInt(l[2]);
          return (dayNum-1) % step.val === 0 ? [l[0],l[1]] : null;
        },
        color:'#9ca3af', font:{size:fontSize,weight:'400'}, maxRotation:0, autoSkip:false, align:'center'
      },
      afterFit(axis){
        const totalBars = axis.ticks.length;
        if(totalBars > 0){
          const barPx = axis.width / totalBars;
          step.val = Math.max(1, Math.ceil(labelPx / barPx));
        }
      },
      grid:{display:false}, border:{display:false}
    },
    xDay: {
      position:'bottom',
      offset:true,
      ticks:{
        callback(val){
          const l=this.getLabelForValue(val);
          if(!Array.isArray(l)) return null;
          const dayNum=parseInt(l[2]);
          return (dayNum-1) % step.val === 0 ? l[2] : null;
        },
        color:'#111827', font:{size:fontSize,weight:'700'}, maxRotation:0,
        autoSkip:false, align:'center'
      },
      afterBuildTicks(axis) {
        const xAxis = axis.chart.scales['x'];
        if (xAxis && xAxis.ticks) {
          axis.ticks = xAxis.ticks.map(t => ({ ...t }));
        }
      },
      grid:{display:false}, border:{color:'#9ca3af'}, title
    }
  };
}
function yCfg(pos='left', color='#374151') {
  return { position:pos, ticks:{color,font:{size:11,weight:'500'},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v}, grid:{color:'#e5e7eb'}, border:{display:false}, afterFit(axis){ axis.width = Math.max(axis.width, 48); } };
}

function renderMain(days) {
  const data = sliceDays(days, rangeState.main);
  const labels = data.map(d => fmtWithDay(d));
  if (charts.main) charts.main.destroy();
  const ctx = document.getElementById('chart-main').getContext('2d');
  charts.main = new Chart(ctx, {
    data: { labels, datasets: [
      { type:'bar',  label:'Daily Total',       yAxisID:'yL', data:data.map(d=>d.daily),   backgroundColor:'rgba(59,130,246,0.4)', borderColor:'rgba(59,130,246,0.65)', borderWidth:1, borderRadius:3, order:10 },
      { type:'line', label:'Avg per day',        yAxisID:'yL', data:data.map(d=>d.avg),     borderColor:'#2563eb', borderWidth:1.5, borderDash:[5,4], pointRadius:0, fill:false, tension:0.3, order:4 },
      { type:'line', label:'Running Total',      yAxisID:'yR', data:data.map(d=>d.running), borderColor:'#111827', borderWidth:2.5, pointRadius:0, pointHoverRadius:4, fill:false, tension:0.2, order:1 },
      { type:'line', label:'Target No Rest Day', yAxisID:'yR', data:data.map(d=>d.tgt_no), borderColor:'#f59e0b', borderWidth:2,   pointRadius:0, fill:false, tension:0, order:3 },
      { type:'line', label:'14-Day MA',           yAxisID:'yL', data:data.map(d=>d.ma14),   borderColor:'#ea580c', borderWidth:1.5, borderDash:[5,4], pointRadius:0, fill:false, tension:0.4, order:2, spanGaps:true },
    ]},
    options: {
      responsive:true, maintainAspectRatio:false, animation:{duration:500},
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{...ttCfg(), callbacks:{
        title: items => { const d=data[items[0].dataIndex]; return fmtShort(d.date)+' — Day '+d.dayNum; },
        label: item  => { const v=item.parsed.y; if(v==null)return null; return `${item.dataset.label}: ${Math.round(v).toLocaleString()}`; }
      }}},
      scales: {
        ...xScales(true),
        yL: { ...yCfg('left','#1d4ed8'), title:{display:true,text:'Daily Total',color:'#1d4ed8',font:{size:12,weight:'600'}} },
        yR: { ...yCfg('right','#374151'), grid:{display:false}, title:{display:true,text:'Running Total',color:'#374151',font:{size:12,weight:'600'}} }
      }
    }
  });
}

function renderChartDaily(days) {
  const data = sliceDays(days, rangeState.daily);
  if (charts.daily) charts.daily.destroy();
  const ctx = document.getElementById('chart-daily').getContext('2d');
  charts.daily = new Chart(ctx, { data:{ labels:data.map(d=>fmtWithDay(d)), datasets:[
    { type:'bar', label:'Daily Total', data:data.map(d=>d.daily),
      backgroundColor:data.map(d=>d.surplus>=0?'rgba(22,163,74,0.55)':'rgba(220,38,38,0.55)'),
      borderColor:data.map(d=>d.surplus>=0?'rgba(22,163,74,0.85)':'rgba(220,38,38,0.85)'),
      borderWidth:1, borderRadius:3, order:2 },
    { type:'line', label:'Required/day', data:data.map(()=>Math.round(AVG_NO_REST)),
      borderColor:'#9ca3af', borderWidth:1.5, borderDash:[5,4], pointRadius:0, fill:false, tension:0, order:1 }
  ]}, options:{ responsive:true, maintainAspectRatio:false, animation:{duration:400},
    layout:{ padding:{ left:10 } },
    plugins:{ legend:{display:false}, tooltip:{...ttCfg()}},
    scales:{ ...xScales(true), y:{ ...yCfg(), min:0 } }}});
}

function renderChartAvg(days) {
  const data = sliceDays(days, rangeState.avg);
  if (charts.avg) charts.avg.destroy();
  const ctx = document.getElementById('chart-avg').getContext('2d');
  const g = ctx.createLinearGradient(0,0,0,200); g.addColorStop(0,'rgba(37,99,235,0.14)'); g.addColorStop(1,'rgba(37,99,235,0)');
  charts.avg = new Chart(ctx, { type:'line', data:{ labels:data.map(d=>fmtWithDay(d)), datasets:[
    { label:'Avg/Day', data:data.map(d=>d.avg), borderColor:'#2563eb', borderWidth:2, pointRadius:0, fill:true, backgroundColor:g, tension:0.4 },
    { label:'Required', data:data.map(()=>Math.round(AVG_NO_REST)), borderColor:'#9ca3af', borderWidth:1.5, borderDash:[5,4], pointRadius:0, fill:false, tension:0 }
  ]}, options:{ responsive:true, maintainAspectRatio:false, animation:{duration:400},
    layout:{ padding:{ left:10 } },
    plugins:{ legend:{display:false}, tooltip:{...ttCfg()}},
    scales:{ ...xScales(true), y:{ ...yCfg(), min:0 } }}});
}

function renderChartRunning(days) {
  const data = sliceDays(days, rangeState.running);
  if (charts.running) charts.running.destroy();
  const ctx = document.getElementById('chart-running').getContext('2d');
  const g = ctx.createLinearGradient(0,0,0,200); g.addColorStop(0,'rgba(37,99,235,0.14)'); g.addColorStop(1,'rgba(37,99,235,0)');
  charts.running = new Chart(ctx, { type:'line', data:{ labels:data.map(d=>fmtWithDay(d)), datasets:[
    { label:'Running Total', data:data.map(d=>d.running), borderColor:'#2563eb', borderWidth:2.5, pointRadius:0, fill:true, backgroundColor:g, tension:0.3 },
    { label:'Required Pace', data:data.map(d=>d.tgt_no), borderColor:'#9ca3af', borderWidth:1.5, borderDash:[5,4], pointRadius:0, fill:false, tension:0 }
  ]}, options:{ responsive:true, maintainAspectRatio:false, animation:{duration:400},
    layout:{ padding:{ left:10 } },
    plugins:{ legend:{display:false}, tooltip:{...ttCfg()}},
    scales:{ ...xScales(true), y:{ ...yCfg(), min:0, max:100000 } }}});
}

function setMainRange(range, btn) { rangeState.main=range; btn.closest('.rg').querySelectorAll('.rb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderMain(buildDays()); }
function switchTab(tab, btn) { document.querySelectorAll('.ct').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.cp').forEach(p=>p.classList.remove('active')); document.getElementById('cp-'+tab).classList.add('active'); }
function setRange(tab, range, btn) { rangeState[tab]=range; btn.closest('.rg').querySelectorAll('.rb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); const days=buildDays(); if(tab==='daily')renderChartDaily(days); if(tab==='avg')renderChartAvg(days); if(tab==='running')renderChartRunning(days); }

function renderStats(days) {
  const today = dStr(new Date()), td = days.find(d=>d.date===today);
  const todayNum = td?.dayNum || 1;
  const logged = days.filter(d=>d.hasData), last = logged[logged.length-1];
  const total = last?.running || 0, elapsed = last?.dayNum || 1;
  const avg = (total>0&&elapsed>0) ? Math.round(total/elapsed) : 0;
  const daysLeft = TOTAL_DAYS - todayNum;
  const needed = daysLeft>0 ? Math.round((GOAL-total)/daysLeft) : 0;
  const surplus = total - Math.round(todayNum*GOAL/TOTAL_DAYS);
  const pct = Math.min(100, total/GOAL*100);
  let streak=0; for(let i=logged.length-1;i>=0;i--){if(logged[i].daily>0)streak++;else break;}

  document.getElementById('headerTotal').textContent = total.toLocaleString();
  document.getElementById('s-total').textContent   = total.toLocaleString();
  document.getElementById('s-remain').textContent  = Math.max(0,GOAL-total).toLocaleString();
  document.getElementById('s-avg').textContent     = avg.toLocaleString();
  document.getElementById('s-surplus').textContent = (surplus>=0?'+':'')+surplus.toLocaleString();
  document.getElementById('card-surplus').className = 'stat-card '+(surplus>=0?'sc-green':'sc-red');

  document.getElementById('progress-pct').textContent = pct.toFixed(1)+'%';
  setTimeout(()=>{ document.getElementById('progress-fill').style.width=pct+'%'; }, 80);
  document.getElementById('target-line').style.left = Math.min(100,todayNum/TOTAL_DAYS*100)+'%';
  document.getElementById('pace-label').textContent = surplus>=0
    ? `+${surplus.toLocaleString()} ahead of pace`
    : `${Math.abs(surplus).toLocaleString()} behind pace`;
  document.querySelectorAll('.stat-card').forEach(c=>setTimeout(()=>c.classList.add('loaded'),80));
}

function renderTable(days) {
  const today = dStr(new Date());
  const cutoff = new Date(today); cutoff.setDate(cutoff.getDate()+7);
  let filtered = days.filter(d => new Date(d.date+'T00:00:00') <= cutoff);
  if (filterMode==='logged') filtered = filtered.filter(d=>d.hasData);
  if (filterMode==='rest')   filtered = filtered.filter(d=>d.hasData&&d.daily===0);
  filtered = [...filtered].reverse();
  document.getElementById('table-body').innerHTML = filtered.map(d => {
    const isToday = d.date===today, isRest = d.hasData&&d.daily===0;
    const surStr = d.surplus>=0
      ? `<span class="sur">+${d.surplus.toLocaleString()}</span>`
      : `<span class="def">${d.surplus.toLocaleString()}</span>`;
    const dateStr = new Date(d.date+'T00:00:00').toLocaleDateString('en-AU',{weekday:'short',month:'short',day:'numeric'});
    const cell = v => v>0 ? v : `<span class="dim">—</span>`;
    if (!d.hasData) return `<tr><td>${dateStr}</td><td>${d.dayNum}</td><td colspan="8" class="dim">—</td><td></td></tr>`;
    return `<tr class="${isToday?'today-row':''}">
      <td>${dateStr}${isToday?'<span class="tag-today">TODAY</span>':''}</td>
      <td>${d.dayNum}</td>
      <td>${cell(d.am)}</td><td>${cell(d.pm)}</td><td>${cell(d.night)}</td>
      <td>${isRest?`<span class="dim">Rest</span>`:`<strong>${d.daily.toLocaleString()}</strong>`}</td>
      <td style="color:#ea580c">${d.ma14!=null?d.ma14:'—'}</td>
      <td><strong>${d.running.toLocaleString()}</strong></td>
      <td style="color:#2563eb">${d.avg||'—'}</td>
      <td style="color:#9ca3af">${d.tgt_no.toLocaleString()}</td>
      <td>${surStr}</td>
    </tr>`;
  }).join('');
}

function setFilter(mode, btn) {
  filterMode=mode;
  document.querySelectorAll('.bt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(buildDays());
}

function render() {
  const days = buildDays();
  renderStats(days); renderMain(days); renderChartDaily(days); renderChartAvg(days); renderChartRunning(days); renderTable(days);
}

  document.getElementById('main').innerHTML = `

        </div>
      </div>
      <div class="chart-body"><div class="chart-inner"><canvas id="chart-main"></canvas></div></div>
      <div class="chart-legend">
        <div class="li"><div class="lb" style="background:rgba(59,130,246,0.6)"></div>Daily Total</div>
        <div class="li"><div class="ld" style="border-top:2px dashed #2563eb"></div>Avg/Day</div>
        <div class="li"><div class="ll" style="background:#111827"></div>Running Total</div>

      </div>

        <div class="cp active" id="cp-daily">
          <div class="pc">
            <div class="rg"><button class="rb" onclick="setRange('daily',30,this)">Last 30</button><button class="rb" onclick="setRange('daily',60,this)">Last 60</button><button class="rb active" onclick="setRange('daily',0,this)">All</button></div>
            <div class="pl"><div class="li"><div class="lb" style="background:#16a34a"></div>On/Ahead</div><div class="li"><div class="lb" style="background:#dc2626"></div>Behind</div></div>
          </div>
          <div class="detail-chart-inner"><canvas id="chart-daily"></canvas></div>
        </div>
        <div class="cp" id="cp-avg">
          <div class="pc"><div class="rg"><button class="rb" onclick="setRange('avg',30,this)">Last 30</button><button class="rb" onclick="setRange('avg',60,this)">Last 60</button><button class="rb active" onclick="setRange('avg',0,this)">All</button></div></div>
          <div class="detail-chart-inner"><canvas id="chart-avg"></canvas></div>
        </div>
        <div class="cp" id="cp-running">
          <div class="pc"><div class="rg"><button class="rb" onclick="setRange('running',30,this)">Last 30</button><button class="rb" onclick="setRange('running',60,this)">Last 60</button><button class="rb active" onclick="setRange('running',0,this)">All</button></div></div>
          <div class="detail-chart-inner"><canvas id="chart-running"></canvas></div>

    <div class="sec">Activity Log</div>
    <div class="table-card">

        <table>
          <thead><tr><th>Date</th><th>Day#</th><th>Set 1</th><th>Set 2</th><th>Set 3</th><th>Daily</th><th>14d MA</th><th>Running</th><th>Avg/Day</th><th>Target</th><th>Surplus</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>`;
}

// ── STARTUP ────────────────────────────────────────────────────────────────────
(async function init() {
  try {
    const count = await loadDropbox();
    buildApp();
    const loader = document.getElementById('loading');
    if (loader) { loader.classList.add('fade-out'); setTimeout(()=>loader.style.display='none', 500); }
    render();
    setSyncBadge('ok', `${count} days loaded`);
    setTimeout(()=>setSyncBadge('ok', 'In sync'), 3000);
    window.addEventListener('resize', ()=>{ const d=buildDays(); renderMain(d); renderChartDaily(d); renderChartAvg(d); renderChartRunning(d); });
  } catch(e) {
    console.error('Load failed:', e);
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;font-family:'DM Mono',monospace;">
        <div style="font-size:36px;margin-bottom:16px;">⚠️</div>
        <div style="color:#dc2626;font-size:14px;margin-bottom:8px;">Could not load spreadsheet</div>
        <div style="color:#8a95a8;font-size:11px;max-width:320px;">${e.message}</div>
      </div>`;
    setSyncBadge('error', 'Load failed');
  }
})();
</script>
